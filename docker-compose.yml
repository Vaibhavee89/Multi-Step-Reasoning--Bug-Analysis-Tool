version: '3.8'

services:
  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bug-analysis-backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - MAX_ITERATIONS=${MAX_ITERATIONS:-15}
      - VERBOSE=${VERBOSE:-true}
      - BACKEND_URL=http://backend:8000
      - FRONTEND_URL=http://localhost
    volumes:
      - ./backend/temp_repos:/app/temp_repos
      - backend-cache:/app/data/cache
    networks:
      - bug-analysis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend Service (Production)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bug-analysis-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - bug-analysis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  bug-analysis-network:
    driver: bridge

volumes:
  backend-cache:
    driver: local
