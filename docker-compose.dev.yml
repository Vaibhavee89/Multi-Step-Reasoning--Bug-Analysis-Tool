version: '3.8'

services:
  # Backend API Service (Development)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bug-analysis-backend-dev
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - MAX_ITERATIONS=${MAX_ITERATIONS:-15}
      - VERBOSE=${VERBOSE:-true}
      - BACKEND_URL=http://localhost:8000
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend:/app/backend
      - ./src:/app/src
      - ./backend/temp_repos:/app/temp_repos
      - backend-cache:/app/data/cache
    networks:
      - bug-analysis-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app/backend

  # Frontend Service (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: bug-analysis-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - bug-analysis-network
    restart: unless-stopped

networks:
  bug-analysis-network:
    driver: bridge

volumes:
  backend-cache:
    driver: local
